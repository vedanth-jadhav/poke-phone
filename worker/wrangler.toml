name = "poke-phone-backend"
main = "src/index.ts"
compatibility_date = "2026-06-01"

[vars]
AUDIO_TTL_SECONDS = "86400"
MAX_AUDIO_BYTES = "20971520"
# Preferred new Poke ingest config:
# Set POKE_INGEST_ENDPOINT_ID as a secret or add it here if Poke gives you one.
#
# Backward-compatible fallback:
POKE_API_URL = "https://poke.com/api/v1/inbound/api-message"

[[durable_objects.bindings]]
name = "AUDIO_STORE"
class_name = "AudioObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AudioObject"]
